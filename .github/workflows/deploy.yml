# Assemble + deploy the static landing page to GitHub Pages on push to `main`.
#
# This same workflow runs in BOTH repos:
#   • Glazkoff/care-landing (private)    → glazkoff.github.io/care-landing    (preview)
#   • AIRI-MAESTRO/care-page (public)    → airi-maestro.github.io/care-page    (production)
# The public copy is created by `mirror.yml`: pushing to the private `release`
# branch force-pushes a full snapshot (including this file) onto the public
# repo's `main`, which then triggers this workflow there.
#
# Pages is enabled automatically by the "Configure Pages" step below
# (enablement: true), so no manual Settings → Pages step is needed per repo.
# Analytics: set the YANDEX_METRIKA_ID secret in each repo where you want the
# Yandex Metrica counter injected (absent → step is skipped, counter stays off).
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          # Auto-create/enable the Pages site via the API so the workflow works
          # in a fresh repo without the manual Settings → Pages step (needs the
          # `pages: write` permission granted above).
          enablement: true

      - name: Assemble site
        run: |
          mkdir -p _site
          cp index.html styles.css main.js i18n.js _site/
          cp -r assets _site/

      - name: Inject Yandex Metrica counter ID
        env:
          YM_ID: ${{ secrets.YANDEX_METRIKA_ID }}
        run: |
          if [ -n "$YM_ID" ]; then
            sed -i "s/__YM_COUNTER_ID__/${YM_ID}/g" _site/index.html
          else
            echo "YANDEX_METRIKA_ID secret not set — skipping (counter stays disabled)."
          fi

      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
