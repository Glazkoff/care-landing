name: Mirror to public repo

# On every push to `release`, force-push a single squashed snapshot of the
# working tree to the public mirror AIRI-MAESTRO/care-page (its `main` branch).
#
# We build an orphan commit (no parents) and force-push it, so the private
# repo's internal commit history NEVER reaches the public mirror — the public
# `main` always shows exactly one commit: the current release snapshot.
#
# The snapshot includes `.github/workflows/deploy.yml`, so once it lands on the
# public repo's `main`, GitHub runs that workflow THERE and publishes the page
# to https://airi-maestro.github.io/care-page/ (GitHub Pages). For that to
# fire, MIRROR_TOKEN must include Workflows: read & write (see note below), and
# the public repo must have Pages → Source: "GitHub Actions" enabled once.
on:
  push:
    branches: [release]
  workflow_dispatch:

# Only reads from this repo; the push to the mirror is authenticated with the
# MIRROR_TOKEN secret, not GITHUB_TOKEN.
permissions:
  contents: read

# Never let two snapshots race onto the public mirror at once.
concurrency:
  group: mirror-public
  cancel-in-progress: false

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout release tree
        uses: actions/checkout@v5
        with:
          ref: release
          # We squash to a single orphan commit, so only the current tree
          # matters — no need to fetch history.
          fetch-depth: 1
          # Don't persist the GITHUB_TOKEN as an http.extraheader in git
          # config: that header is scoped to github.com and would override
          # the MIRROR_TOKEN we embed in the push URL, making the push run
          # as github-actions[bot] (which has no access to the mirror → 403).
          persist-credentials: false

      - name: Push squashed snapshot to public mirror
        env:
          MIRROR_TOKEN: ${{ secrets.MIRROR_TOKEN }}
          YM_ID: ${{ secrets.YANDEX_METRIKA_ID }}
        run: |
          set -euo pipefail

          if [ -z "${MIRROR_TOKEN:-}" ]; then
            echo "::error::MIRROR_TOKEN secret is not set. Create a fine-grained PAT on AIRI-MAESTRO/care-page with Contents: read & write AND Workflows: read & write, then add it as the MIRROR_TOKEN repo secret." >&2
            exit 1
          fi

          # Bake the Yandex Metrica counter ID into the public snapshot. The ID
          # lives in THIS (private) repo's YANDEX_METRIKA_ID secret; the public
          # mirror holds no secrets, so we replace the __YM_COUNTER_ID__
          # placeholder here. The counter ID is not sensitive — it ships in the
          # page HTML on the live site anyway. The private preview keeps the
          # placeholder and injects at deploy time instead.
          if [ -n "${YM_ID:-}" ]; then
            sed -i "s/__YM_COUNTER_ID__/${YM_ID}/g" index.html
            echo "Injected Yandex Metrica counter ID into index.html for the public mirror."
          else
            echo "::warning::YANDEX_METRIKA_ID secret not set — public site will ship without Metrica."
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Orphan branch = root commit with no parent, holding the full tree.
          git checkout --orphan public-snapshot
          git add -A
          git commit -m "Release snapshot from release @ ${GITHUB_SHA::7}"

          # Force-replace the mirror's main with this single snapshot commit.
          # `-c http.https://github.com/.extraheader=` clears any persisted
          # Authorization header so the MIRROR_TOKEN in the URL is honoured.
          git -c http.https://github.com/.extraheader= push --force \
            "https://x-access-token:${MIRROR_TOKEN}@github.com/AIRI-MAESTRO/care-page.git" \
            public-snapshot:main
